  version: '1.0.4'
  repository: 'https://github.com/yeeroen/use-bem'
  description: 'A lightweight TypeScript utility that generates BEM class name arrays from block, element, and modifier inputs.'
  primary_framework: 'framework-agnostic'

domains:
  - name: 'generating BEM class names'
    slug: 'bem-class-generation'
    description: 'Creating correctly structured BEM class name arrays for component templates using the useBem factory and its block, element, and modifier helpers.'

skills:
  - name: 'Generate BEM Classes'
    slug: 'generate-bem-classes'
    domain: 'bem-class-generation'
    description: 'Using useBem to produce BEM class name arrays when building component templates — primarily Vue but works in any framework.'
    type: 'core'
    covers:
      - 'useBem() factory function'
      - 'block() — returns string[] of block class names with modifiers'
      - 'element() — returns string[] of element class names with modifiers'
      - 'modifier() — creates modifier strings with boolean, string, number, or key-only values'
      - 'BemBlock interface'
      - 'BemModifier and BemModifierValue types'
    tasks:
      - 'Set up BEM class names for a new component'
      - 'Add modifiers to a block or element based on component state'
      - 'Apply conditional modifiers using boolean values'
      - 'Bind BEM class arrays to Vue template :class attributes'
    failure_modes:
      - mistake: 'Treating block()/element() return as string'
        mechanism: 'block() and element() return string[], not string. In React or vanilla JS, the array must be joined with .join(" ") before use as a className. Vue :class accepts arrays natively.'
        wrong_pattern: |
          // React — incorrect
          <div className={block(modifier('active', true))} />
        correct_pattern: |
          // React — correct
          <div className={block(modifier('active', true)).join(' ')} />
          // Vue — array works natively
          <div :class="block(modifier('active', true))" />
        source: 'src/use-bem.ts:8-10, src/types.ts:6-7'
        priority: 'CRITICAL'
        status: 'active'

      - mistake: 'Treating useBem as a React hook'
        mechanism: 'The use prefix matches React hook naming conventions, but useBem is a plain factory function with no React dependency. It can be called anywhere — conditionally, outside components, in loops.'
        wrong_pattern: |
          // Incorrect — treating it as a hook
          function MyComponent() {
            // Agent adds unnecessary hook rules
            const { block, modifier } = useBem('my-component') // works but misleading context
            if (condition) {
              const { block } = useBem('other') // Agent avoids this thinking it violates hook rules
            }
          }
        correct_pattern: |
          // Correct — it's a plain function, call it anywhere
          const { block, modifier } = useBem('my-component')
          const other = useBem('other-component')
        source: 'src/use-bem.ts:28-34, maintainer interview'
        priority: 'HIGH'
        status: 'active'

      - mistake: 'Using modifier() result directly as class name'
        mechanism: 'modifier("active", false) returns an empty string "". block() and element() filter these out, but using modifier() directly in a template produces an empty class attribute entry.'
        wrong_pattern: |
          // Incorrect — modifier result used directly
          <div :class="modifier('active', isActive)" />
        correct_pattern: |
          // Correct — pass modifiers through block() or element()
          <div :class="block(modifier('active', isActive))" />
        source: 'src/use-bem.ts:16-26'
        priority: 'HIGH'
        status: 'active'

      - mistake: 'Writing BEM strings manually instead of using library'
        mechanism: 'An agent may generate BEM class names as manual string concatenation instead of using the useBem helpers, defeating the purpose of the library.'
        wrong_pattern: |
          // Incorrect — manual BEM strings
          <div :class="`button button--${size} button--${variant}`" />
        correct_pattern: |
          // Correct — use the library
          const { block, modifier } = useBem('button')
          <div :class="block(modifier('size', size), modifier('variant', variant))" />
        source: 'README.md, maintainer interview'
        priority: 'HIGH'
        status: 'active'

      - mistake: 'Using wrong BEM separator format'
        mechanism: 'An agent might use single dashes for modifiers (block-modifier) or dots or other separators instead of the double-dash (--) and double-underscore (__) conventions that the library enforces.'
        wrong_pattern: |
          // Incorrect — wrong separators (not using the library)
          const classes = ['button', 'button-primary', 'button_icon']
        correct_pattern: |
          // Correct — library produces proper BEM separators
          const { block, element, modifier } = useBem('button')
          block(modifier('primary', true))   // ['button', 'button--primary']
          element('icon')                     // ['button__icon']
        source: 'src/use-bem.ts:3-6, src/use-bem.ts:12-14'
        priority: 'MEDIUM'
        status: 'active'

